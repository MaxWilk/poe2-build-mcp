name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Check out PoB-PoE2 (pinned) + apply fork patches
        # Pinned commit recorded in pob/PINNED.md. A blobless clone keeps the full commit graph so
        # the pinned SHA stays reachable after dev moves (GitHub refuses a shallow fetch of an
        # unadvertised SHA); then checkout + apply our tracked fork patches (pob/patches/, §7).
        shell: bash
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/PathOfBuildingCommunity/PathOfBuilding-PoE2.git pob/PathOfBuilding-PoE2
          git -C pob/PathOfBuilding-PoE2 config core.autocrlf false # keep LF so the LF patch applies
          git -C pob/PathOfBuilding-PoE2 checkout -q a82a33b
          (cd pob/PathOfBuilding-PoE2 && git apply --ignore-whitespace ../patches/*.patch)

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check server scripts pipeline tests
          uv run ruff format --check server scripts pipeline tests

      - name: Validate .mcpb manifest
        run: npx --yes @anthropic-ai/mcpb validate manifest.json

      - name: Build corpus
        run: uv run python -m pipeline.build_corpus

      - name: Run tests (golden engine + corpus)
        run: uv run pytest
