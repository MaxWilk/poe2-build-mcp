name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Check out PoB-PoE2 (pinned) + apply fork patches
        # Pinned commit recorded in pob/PINNED.md — fetch the exact SHA for reproducible CI, then
        # apply our tracked fork patches (pob/patches/) per CLAUDE.md §7.
        run: |
          POB_COMMIT=a82a33b
          git init -q pob/PathOfBuilding-PoE2
          git -C pob/PathOfBuilding-PoE2 remote add origin https://github.com/PathOfBuildingCommunity/PathOfBuilding-PoE2.git
          git -C pob/PathOfBuilding-PoE2 fetch -q --depth 1 origin "$POB_COMMIT"
          git -C pob/PathOfBuilding-PoE2 checkout -q FETCH_HEAD
          (cd pob/PathOfBuilding-PoE2 && git apply ../patches/*.patch)

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check server scripts pipeline tests
          uv run ruff format --check server scripts pipeline tests

      - name: Validate .mcpb manifest
        run: npx --yes @anthropic-ai/mcpb validate manifest.json

      - name: Build corpus
        run: uv run python -m pipeline.build_corpus

      - name: Run tests (golden engine + corpus)
        run: uv run pytest
